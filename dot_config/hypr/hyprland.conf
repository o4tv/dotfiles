monitor=eDP-1,1920x1080,auto,1
monitor=HDMI-A-1,1920x1080,auto,auto

$terminal = alacritty
$fileManager = dolphin
$menu = rofi -show drun
$browser = google-chrome-stable

general {
    gaps_in = 5
    gaps_out = 10

    col.active_border = rgba(ccccffee)
    col.inactive_border = rgba(595959aa)
}

animations {
    enabled = false
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

input {
    kb_layout = us,br
    kb_options = grp:shifts_toggle
    repeat_rate = 50
    repeat_delay = 200

    sensitivity = -0.25 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

}

device {
    name = asuf1200:00-2808:0203-touchpad
    sensitivity = 0.25

    natural_scroll = true
    scroll_factor = 0.5
}

workspace = 10, monitor:eDP-1, persistent:true
workspace = 1, monitor:HDMI-A-1, persistent:true

$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod shift, return, exec, $terminal -e tmux new -A
bind = $mainMod alt, return, exec, $terminal -e ssh tv@192.168.0.4
bind = $mainMod, space, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod shift, space, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod, F11, fullscreenstate, 0 2
bind = $mainMod shift, F, fullscreenstate, 2 -1
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, N, togglesplit, # dwindle
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = ,         PRINT, exec, hyprshot -m window
bind = $mainMod, PRINT, exec, hyprshot -m output
bind = shift,    PRINT, exec, hyprshot -m region
bind = $mainMod ctrl alt, L, exec, sh -c '(sleep 0s; hyprlock)' & disown
bind = $mainMod alt, L, exec, sh -c 'hyprlock & disown && systemctl suspend'
bind = $mainMod alt, space, exec, sh -c "pgrep waybar && pkill start.sh || /home/tabin/.config/waybar/start.sh"
bind = $mainMod, kp_multiply, exec, /home/tabin/.local/bin/positivo toggle @0
bind = $mainMod, kp_add, exec, /home/tabin/.config/hypr/scripts/light.sh brightness +25
bind = $mainMod, kp_subtract, exec, /home/tabin/.config/hypr/scripts/light.sh brightness -25
bind = $mainMod ctrl, kp_add, exec, /home/tabin/.config/hypr/scripts/light.sh brightness 100
bind = $mainMod ctrl, kp_subtract, exec, /home/tabin/.config/hypr/scripts/light.sh brightness 1
bind = $mainMod alt, kp_add, exec, /home/tabin/.config/hypr/scripts/light.sh temp 100
bind = $mainMod alt, kp_subtract, exec, /home/tabin/.config/hypr/scripts/light.sh temp 0
bind = $mainMod alt, kp_divide, exec, /home/tabin/.config/hypr/scripts/light.sh temp 50

# Move (vim style)
bind = $mainMod shift, H, movewindow, l
bind = $mainMod shift, L, movewindow, r
bind = $mainMod shift, K, movewindow, u
bind = $mainMod shift, J, movewindow, d

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Move workspaces between monitors
bind = $mainMod ctrl, H, movecurrentworkspacetomonitor, l
bind = $mainMod ctrl, J, movecurrentworkspacetomonitor, d
bind = $mainMod ctrl, K, movecurrentworkspacetomonitor, u
bind = $mainMod ctrl, L, movecurrentworkspacetomonitor, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod alt, mouse:276, exec, sh -c 'echo "click middle" | dotoolc'
bind = $mainMod, mouse:275, exec, sh -c 'echo "wheel -5" | dotoolc'
bind = $mainMod, mouse:276, exec, sh -c 'echo "wheel 5" | dotoolc'

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86Tools, exec, spotify-launcher

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
windowrule {
    name = fixintellij
    match:class = jetbrains-idea
    no_initial_focus = on
}

windowrule = workspace 10, match:class spotify

env = HYPRSHOT_DIR,Pictures/screenshots

exec-once = swaybg -i /home/tabin/.config/hypr/wallpapers/ok.jpg -m stretch
exec-once = /home/tabin/.config/waybar/start.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/sbin/dotoold
